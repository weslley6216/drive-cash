      faqs:
        - question: "Como registro um ganho?"
          answer: "Toque no + azul e escolha Receita, ou fale com o Caju: \"Fiz R$45 no Uber\". Você escolhe a plataforma, o valor e quantas rotas fez."
        - question: "O que é R$/km?"
          answer: "É o seu lucro dividido pelos quilômetros rodados no período (medidos pelo odômetro). Mostra quanto cada km rodado deixou no seu bolso."
        - question: "Como funciona o Caju?"
          answer: "O Caju entende linguagem natural, por texto ou voz. Diga \"Abasteci R$80 no Orense\" e ele monta o lançamento — você confirma antes de salvar."
        - question: "Como exporto pro imposto de renda?"
          answer: "Em Conta → Exportar, escolha o período e o formato PDF. O relatório sai com receitas, despesas e lucro, pronto pro contador."
        - question: "O saldo do tanque está errado. E agora?"
          answer: "O saldo debita pelo consumo estimado. Registre um abastecimento com tanque cheio pra recalibrar — o app acerta o saldo sozinho."
